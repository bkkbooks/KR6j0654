body:
  text: 聞如是一時佛遊王舍城竹林精舍與四部弟子大衆俱會為說經法爾時維耶離國屬疫氣猛盛赫赫猶如熾火死亡無數無所歸趣無方救療於是阿難長跪合掌白佛言彼阿耶離國遭溫氣疫毒唯願世尊說諸聖術却彼毒氣令得安穩離衆苦患佛告賢者阿難汝當聽受之有七鬼神常吐毒氣以害萬姓若人得毒頭痛寒熱百節欲解苦痛難言人有知其名字者毒不害人是故吾今為汝說之阿難言願欲聞之佛言若四輩弟子欲稱鬼神名安之時當言南無佛陀耶南無達磨耶南無僧伽耶南無十方諸佛南無諸菩薩摩訶薩南無諸聖僧南無呪師某甲今我弟子所說神呪即從其願如是神名我今當說沙羅佉三說沙羅佉已便說呪曰夢多難鬼阿佉尼鬼尼佉尸鬼阿佉那鬼波羅尼鬼阿毗羅鬼波提梨鬼佛言是七鬼神呪名字如是若人熱病時當呼七鬼神名字言疾去疾去莫得久住我弟子身令毒消滅病速除愈我弟子今歸依三寶燒香禮敬行是諸佛所說神呪若有呪神不隨諸佛教者頭破作七分如阿梨樹枝若人得病一日二日三日乃至七日熱病煩悶先呪神水以與病者飲之當三七遍誦此呪經病毒五溫之病並皆消滅若亦立門書著氣病者當額書七鬼神名字復取五色縷線各各結其名字繫著門上大吉祥也若能勤誦此經專心受持齊戒不喫熏辛誦此七鬼神名字溫鬼永斷不過門戶自進至患家鬼見皆走一身永不染天行若能專心勸人書寫受持讀誦此經消殃却害若人不能誦得竹筒盛安門戶上溫鬼不敢過門亦得延年養壽大吉祥也阿難叉手白佛言當何名此經云何奉持佛言此經名為却溫神呪佛說如是天龍鬼神一切大衆聞呪歡喜作禮奉行
